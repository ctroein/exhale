name: Build EXHALE

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which build to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows'
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build frozen app
        working-directory: recipe
        run: |
          pyinstaller exhale.spec --noconfirm --distpath ../dist --workpath ../build

      - name: Show build outputs
        run: |
          Write-Host "dist:"
          Get-ChildItem dist -Recurse
          Write-Host "build:"
          Get-ChildItem build -Recurse -ErrorAction SilentlyContinue

      - name: Build installer
        working-directory: recipe
        run: |
          iscc /DMyAppVersion=${{ github.ref_name }} exhale.iss

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exhale-windows
          path: |
            dist/exhale/**
            dist/*.exe

      - name: Create GitHub release if tag build
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload Windows installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem dist\*.exe
          gh release upload "${{ github.ref_name }}" dist/*.exe --clobber

  macos-app:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'macos'
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build macOS app bundle
        working-directory: recipe
        run: |
          pyinstaller exhale.spec --noconfirm --distpath ../dist --workpath ../build

      - name: Show build outputs
        run: |
          echo "dist:"
          find dist -maxdepth 3 -print
          echo "build:"
          find build -maxdepth 3 -print || true

      - name: Package macOS app as zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent exhale.app exhale-macos.zip

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exhale-macos
          path: dist/exhale-macos.zip

      - name: Create GitHub release if tag build
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" --generate-notes

      - name: Upload macOS zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/exhale-macos.zip --clobber

