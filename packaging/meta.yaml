{% set name = "exhale" %}
{% set version = environ.get("GIT_DESCRIBE_TAG", "0.0.0") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=77.0.3
    - setuptools-scm
  run:
    - python >=3.10
    - numpy
    - scipy
    - scikit-learn
    - pandas
    - h5py
    - napari
    - silx
    - csbdeep
    - tensorflow
    - stardist

test:
  imports:
    - exhale
  commands:
    - exhale --help
  requires:
    - pytest

about:
  home: https://github.com/ctroein/exhale
  license: MIT
  license_file: LICENSE
  summary: "EXHALE, Efficient X-ray Hub Aiding Lung Explorations"

extra:
  recipe-maintainers:
    - ctroein
